name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guardrail tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Der Build benötigt keine echten Secrets. Die Platzhalter reichen,
          # damit next.config/tsconfig/types vollständig kompilieren.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          DATABASE_READONLY_URL: postgresql://placeholder:placeholder@localhost:5432/postgres
